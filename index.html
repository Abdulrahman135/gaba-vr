            document.addEventListener('DOMContentLoaded', () => {

        <script>
            let isDragging = false;
            let activeObject = null;

            // Get all rotatable objects
            const objects = document.querySelectorAll('.rotatable');

            // When clicking an object → set it as active
            objects.forEach(obj => {
            obj.addEventListener('mousedown', () => {
                isDragging = true;
                activeObject = obj;
            });
            });

            // Stop dragging
            window.addEventListener('mouseup', () => {
            isDragging = false;
            activeObject = null;
            });

            // Rotate only the active object
            window.addEventListener('mousemove', (e) => {
            if (!isDragging || !activeObject) return;

            let rotation = activeObject.getAttribute('rotation');

            rotation.y += e.movementX * 0.5;
            

            activeObject.setAttribute('rotation', rotation);
            });
        </script>
