         <script>
            document.addEventListener('DOMContentLoaded', () => {
                const obj = document.querySelector('#myObject');
                const panel = document.querySelector('#infoPanel');

                obj.addEventListener('click', () => {
                panel.setAttribute('visible', true);
                });
            });
        </script>    
        <script>
        obj.addEventListener('click', () => {
            panel.setAttribute('visible', true);
            panel.emit('showPanel');
        });
        </script>

        <script>
            let isDragging = false;
            let activeObject = null;

            // Get all rotatable objects
            const objects = document.querySelectorAll('.rotatable');

            // When clicking an object → set it as active
            objects.forEach(obj => {
            obj.addEventListener('triggerdown', () => {
                isDragging = true;
                activeObject = obj;
            });
            });

            // Stop dragging
            window.addEventListener('triggereup', () => {
            isDragging = false;
            activeObject = null;
            });

            // Rotate only the active object
            window.addEventListener('mousemove', (e) => {
            if (!isDragging || !activeObject) return;

            let rotation = activeObject.getAttribute('rotation');

            rotation.y += e.movementX * 0.5;
            

            activeObject.setAttribute('rotation', rotation);
            });
        </script>
