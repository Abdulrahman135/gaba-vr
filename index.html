<!DOCTYPE html>
<html>
    <head>
        <title>GABA-VR</title>
        <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
        <script src="https://unpkg.com/aframe-look-at-component@latest/dist/aframe-look-at-component.min.js"></script>       
                     
    </head>
    <body>
        
        <a-scene>
            <a-sky color="#D3D3D3"></a-sky>
            <a-box color="gray"
                    position="0 -0.1 -10"
                    width="180"
                    height="0.1"
                    depth="100">
            </a-box>
            <a-cylinder color="blue"
                        position="0 0 -40"
                        radius="5">
            </a-cylinder>
            <a-cylinder color="blue"
                        position="-30 0 -40"
                        radius="5">
            </a-cylinder>
            <a-cylinder color="blue"
                        position="30 0 -40"
                        radius="5">
            </a-cylinder>
            <a-cylinder color="blue"
                        position="-5 0 -30"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="blue"
                        position="5 0 -30"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="blue"
                        position="35 0 -30"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="blue"
                        position="25 0 -30"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="blue"
                        position="-35 0 -30"

            <a-cylinder color="blue"
                        position="-25 0 -30"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="purple"
                        position="-70 0 -10"
                        radius="5">
            </a-cylinder>
            <a-cylinder color="purple"
                        position="-70 0 20"
                        radius="5">
            </a-cylinder>
            <a-cylinder color="purple"
                        position="-60 0 -5"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="purple"
                        position="-60 0 -15"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="purple"
                        position="-60 0 15"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="purple"
                        position="-60 0 25"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="yellow"
                        position="70 0 -10"
                        radius="5">
            </a-cylinder>
            <a-cylinder color="yellow"
                        position="70 0 20"

            </a-cylinder>
            <a-cylinder color="yellow"
                        position="60 0 25"
                        radius="2.5">
            </a-cylinder>
            <a-assets>
                <img id="diazepamimage" src="diazepam/valium.jpg">
                <a-asset-item id="diazepam" src="diazepam/a1b2g2-diazepam.glb"></a-asset-item>
                <a-asset-item id="diazepam-site" src="diazepam/diazepam-site.glb"></a-asset-item>
                <a-asset-item id="diazepam-structure" src="diazepam/diazepam-structure.glb"></a-asset-item>

                <a-asset-item id="flumazenil" src="flumazenil/a1b2g2-flumazemil.glb"></a-asset-item>

                <a-asset-item id="picrotoxin" src="picrotoxin\picrotoxin.glb"></a-asset-item>
                <a-asset-item id="picrotoxin-site" src="picrotoxin\picrotoxin-site.glb"></a-asset-item>
                <a-asset-item id="picrotoxin-structure" src="picrotoxin\picrotoxin-structure.glb"></a-asset-item>

                <a-asset-item id="loreclezole" src="loreclezole\loreclezole.glb"></a-asset-item>
                <a-asset-item id="loreclezole-site" src="loreclezole\loreclezole-site.glb"></a-asset-item>
                <a-asset-item id="loreclezole-structure" src="loreclezole\loreclezole-structure.glb"></a-asset-item>

                <a-asset-item id="alprazolam" src="alprazolam\alprazolam.glb"></a-asset-item>

                <a-asset-item id="etomidate" src="etomidate\etomidate.glb"></a-asset-item>
                <a-asset-item id="etomidate-site" src="etomidate\etomidate-site.glb"></a-asset-item>
                <a-asset-item id="etomidate-structure" src="etomidate\etomidate-structure.glb"></a-asset-item>

                <a-asset-item id="GABA" src=""></a-asset-item>
                <a-asset-item id="GABA-site" src="GABA\GABA-site.glb"></a-asset-item>
                <a-asset-item id="GABA-structure" src="GABA\GABA-structure.glb"></a-asset-item>
            </a-assets>
            <a-entity 
            gltf-model="#diazepam"
            position="1 15.5 -40"
            scale="0.2 0.2 0.2"
            rotation="170 0 50">
            </a-entity>
            <a-entity 
            gltf-model="#diazepam-site"
            position="5 3.5 -30"
            scale=".25 .25 .25"
            rotation="0 0 0">
            </a-entity>
            <a-entity 
            gltf-model="#diazepam-structure"
            position="-5 2 -31"
            scale=".25 .25 .25"
            rotation="190 180 30">
            </a-entity>
            <a-entity 
            gltf-model="#flumazenil"
            position="30.5 15 -42"
            scale="0.2 0.2 0.2"
            rotation="24.1 -59.2 -25">
            </a-entity>
            <a-entity 
            gltf-model="#flumazenil-site"
            position="35 3.5 -29.5"
            scale=".25 .25 .25"
            rotation="0 0 0">
            </a-entity>
            <a-entity 
            gltf-model="#flumazenil-structure"
            position="25 2 -30"
            scale=".25 .25 .25"
            rotation="0 0 0">
            </a-entity>
            <a-entity 
            gltf-model="#zolpidem"
            position="-31 15 -41.7"
            scale="0.2 0.2 0.2"
            rotation="165 210 -30">
            </a-entity>
            <a-entity 
            gltf-model="#zolpidem-site"
            position="-25 3.5 -30"
            scale="0.25 0.25 0.25a"
            rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>
            <a-entity 
            gltf-model="#zolpidem-structure"
            position="-35 2 -29.75"
            scale="4 4 4"
            rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>
           



            <a-entity 
            gltf-model="#picrotoxin"
            position="-70 15 -10"
            scale="0.2 0.2 0.2"
            rotation="55 90 0">
            </a-entity>
            <a-entity 
            gltf-model="#picrotoxin-site"
            position="-60 3.5 -15"
            scale="0.25 0.25 0.25"
            rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>
            <a-entity 
            gltf-model="#picrotoxin-structure"
            position="-60 2 -5"
            scale="0.25 0.25 0.25"
            rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>

            <a-entity 
            gltf-model="#loreclezole"
            position="-70 13 20"
            scale="0.2 0.2 0.2"
            rotation="90 0 -0">
            </a-entity>
            <a-entity 
            gltf-model="#loreclezole-site"
            position="-60 3.5 15"
            scale="0.25 0.25 0.25"
            rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>
            <a-entity 
            gltf-model="#loreclezole-structure"
            position="-60 2 25"
            scale="0.25 0.25 0.25"
            rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>

            <a-entity 
            gltf-model="#alprazolam"
            position="71 14 -11"
            scale="0.2 0.2 0.2"
            rotation="-85 225 -25">
            </a-entity>
            <a-entity 
            gltf-model="#alprazolam-site"
            position="60 3.5 -5"

            rotation="90 0 0">

            </a-entity>

            position="35 3.5 30"
            scale="0.25 0.25 0.25"

            animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>
            <a-entity 
            gltf-model="#GABA-structure"
            position="25 2 30"
            scale="4 4 4"
            rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>

            

            <a-entity position="0.7 7.5 -34.1" rotation="-90 12 0" animation="property: position; to: 1 7.5 -32; dir: alternate; loop: true; dur: 800">

            <a-cylinder height="1" radius="0.03" color="red" position="0 0.5 0"></a-cylinder>
            <a-cone radius-bottom="0.08" height="0.2" color="red" position="0 1.1 0"></a-cone>
            
            </a-entity>
            
            
        </a-scene>

</html>
