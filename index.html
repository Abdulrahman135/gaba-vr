<!DOCTYPE html>
<html>
    <head>
        <title>GABA-VR</title>
        <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
        <script src="https://unpkg.com/aframe-look-at-component@latest/dist/aframe-look-at-component.min.js"></script>       
         <script>
            document.addEventListener('DOMContentLoaded', () => {
                const obj = document.querySelector('#myObject');
                const panel = document.querySelector('#infoPanel');

                obj.addEventListener('click', () => {
                panel.setAttribute('visible', true);
                });
            });
        </script>    
        <script>
        obj.addEventListener('click', () => {
            panel.setAttribute('visible', true);
            panel.emit('showPanel');
        });
        </script>        
    </head>
    <body>
        
        <a-scene>
            <a-text value="Click the screen to lock mouse" position="0 2 -2" align="center" look-at="[camera]" color="black"></a-text>

            <a-entity 
                laser-controls="hand: right"
                raycaster="objects: .clickable"
                line="color: red">
            </a-entity>

            <a-entity 
                laser-controls="hand: left"
                raycaster="objects: .clickable"
                line="color: blue">
            </a-entity>

            <a-entity camera position="0 1.6 25"
                look-controls="pointerLockEnabled: true" 
                wasd-controls>
                <a-cursor raycaster="objects: .clickable"
                            color="black"
                            fuse="false">
                </a-cursor>
            </a-entity>
            <a-box 
                id="myObject"
                position="-2 1.6 -3"
                color="blue"
                class="clickable"
                event-set__enter="color: red"
                event-set__leave="color: blue">
            </a-box>
            <a-plane 
                id="infoPanel"
                position="-2 2 -2"
                width="2"
                height="1"
                color="white"
                visible="false"
                look-at="[camera]"
                animation="property: scale; to: 1 1 1; dur: 300; startEvents: showPanel">
                
                <a-text 
                    value="This is diazepam"
                    color="black"
                    align="center"
                    position="0 0 0.01">
                </a-text>

            </a-plane>
            <a-sky color="#D3D3D3"></a-sky>
            <a-box color="gray"
                    position="0 -0.1 -10"
                    width="180"
                    height="0.1"
                    depth="100">
            </a-box>
            <a-cylinder color="blue"
                        position="0 0 -40"
                        radius="5">
            </a-cylinder>
            <a-cylinder color="blue"
                        position="-30 0 -40"
                        radius="5">
            </a-cylinder>
            <a-cylinder color="blue"
                        position="30 0 -40"
                        radius="5">
            </a-cylinder>
            <a-cylinder color="blue"
                        position="-5 0 -30"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="blue"
                        position="5 0 -30"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="blue"
                        position="35 0 -30"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="blue"
                        position="25 0 -30"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="blue"
                        position="-35 0 -30"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="blue"
                        position="-25 0 -30"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="purple"
                        position="-70 0 -10"
                        radius="5">
            </a-cylinder>
            <a-cylinder color="purple"
                        position="-70 0 20"
                        radius="5">
            </a-cylinder>
            <a-cylinder color="purple"
                        position="-60 0 -5"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="purple"
                        position="-60 0 -15"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="purple"
                        position="-60 0 15"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="purple"
                        position="-60 0 25"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="yellow"
                        position="70 0 -10"
                        radius="5">
            </a-cylinder>
            <a-cylinder color="yellow"
                        position="70 0 20"
                        radius="5">
            </a-cylinder>
            <a-cylinder color="yellow"
                        position="60 0 -5"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="yellow"
                        position="60 0 15"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="yellow"
                        position="60 0 -15"
                        radius="2.5">
            </a-cylinder>
            <a-cylinder color="yellow"
                        position="60 0 25"
                        radius="2.5">
            </a-cylinder>
            <a-assets>
                <img id="diazepamimage" src="diazepam/valium.jpg">
                <a-asset-item id="diazepam" src="diazepam/a1b2g2-diazepam.glb"></a-asset-item>
                <a-asset-item id="diazepam-site" src="diazepam/diazepam-site.glb"></a-asset-item>
                <a-asset-item id="diazepam-structure" src="diazepam/diazepam-structure.glb"></a-asset-item>

                <a-asset-item id="picrotoxin-structure" src="picrotoxin\picrotoxin-structure.glb"></a-asset-item>

                <a-asset-item id="loreclezole" src="loreclezole\loreclezole.glb"></a-asset-item>
                <a-asset-item id="loreclezole-site" src="loreclezole\loreclezole-site.glb"></a-asset-item>
                <a-asset-item id="loreclezole-structure" src="loreclezole\loreclezole-structure.glb"></a-asset-item>

                <a-asset-item id="alprazolam" src="alprazolam\alprazolam.glb"></a-asset-item>
                <a-asset-item id="alprazolam-site" src="alprazolam\alprazolam-site.glb"></a-asset-item>
                <a-asset-item id="alprazolam-structure" src="alprazolam\alprazolam-structure.glb"></a-asset-item>

                <a-asset-item id="etomidate" src="etomidate\etomidate.glb"></a-asset-item>

                <a-asset-item id="etomidate-structure" src="etomidate\etomidate-structure.glb"></a-asset-item>

                <a-asset-item id="GABA" src=""></a-asset-item>
                <a-asset-item id="GABA-site" src="GABA\GABA-site.glb"></a-asset-item>
                <a-asset-item id="GABA-structure" src="GABA\GABA-structure.glb"></a-asset-item>
            </a-assets>
            <a-entity 
                gltf-model="#diazepam"
                position="1 15.5 -40"
                scale="0.2 0.2 0.2"
                rotation="170 0 50">
            </a-entity>
            <a-entity 
                gltf-model="#diazepam-site"
                position="5 3.5 -30"
                scale=".25 .25 .25"
                rotation="0 0 0">
            </a-entity>
            <a-entity 
                gltf-model="#diazepam-structure"
                position="-5 2 -31"

            </a-entity>
            <a-entity

            <a-entity

            </a-entity>
            <a-entity

            </a-entity>
            <a-entity 
                gltf-model="#zolpidem-site"
                position="-25 3.5 -30"
                scale="0.25 0.25 0.25a"
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>
            <a-entity 
                gltf-model="#zolpidem-structure"

                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>
           
            <a-entity 
                gltf-model="#picrotoxin"
                position="-70 15 -10"
                scale="0.2 0.2 0.2"
                rotation="55 90 0">
            </a-entity>
            <a-entity 
                gltf-model="#picrotoxin-site"
                position="-60 3.5 -15"
                scale="0.25 0.25 0.25"
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>
            <a-entity 
                gltf-model="#picrotoxin-structure"
                position="-60 2 -5"
                scale="0.25 0.25 0.25"
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>

            <a-entity 
                gltf-model="#loreclezole"
                position="-70 13 20"
                scale="0.2 0.2 0.2"
                rotation="90 0 -0">
            </a-entity>
            <a-entity 
                gltf-model="#loreclezole-site"
                position="-60 3.5 15"

            </a-entity>

            <a-entity

            </a-entity>
            <a-entity 
                gltf-model="#alprazolam-site"
                position="60 3.5 -5"

            </a-entity>

            <a-entity 
                gltf-model="#GABA"

                scale="0.2 0.2 0.2"

            </a-entity>
            <a-entity 
                gltf-model="#GABA-site"
                position="35 3.5 30"
                scale="0.25 0.25 0.25"
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>
            <a-entity 
                gltf-model="#GABA-structure"
                position="25 2 30"
                scale="0.25 0.25 0.25"
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>

            

            <a-entity position="0.7 7.5 -34.1" rotation="-90 12 0" animation="property: position; to: 1 7.5 -32; dir: alternate; loop: true; dur: 800">

            <a-cylinder height="1" radius="0.03" color="red" position="0 0.5 0"></a-cylinder>
            <a-cone radius-bottom="0.08" height="0.2" color="red" position="0 1.1 0"></a-cone>
            
            </a-entity>
            
            
        </a-scene>
    </body>
</html>
