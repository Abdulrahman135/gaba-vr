        <script>
            AFRAME.registerComponent('rotate-on-trigger-hover', {
            init: function () {
                this.hovering = false;
                this.rotating = false;
                this.direction = 1;
                this.activeHand = null;

                // When controller points at object
                this.el.addEventListener('mouseenter', (e) => {
                this.hovering = true;

                const hand = e.detail.cursorEl;
                this.activeHand = hand;

                if (hand && hand.getAttribute('laser-controls')) {
                    const handType = hand.getAttribute('laser-controls').hand;
                    this.direction = (handType === 'left') ? -1 : 1;
                }

                // Listen for trigger on THIS controller only
                if (this.activeHand) {
                    this.activeHand.addEventListener('triggerdown', this.onTriggerDown);
                    this.activeHand.addEventListener('triggerup', this.onTriggerUp);
                }
                });

                this.el.addEventListener('mouseleave', () => {
                this.hovering = false;
                this.rotating = false;

                if (this.activeHand) {
                    this.activeHand.removeEventListener('triggerdown', this.onTriggerDown);
                    this.activeHand.removeEventListener('triggerup', this.onTriggerUp);
                }

                this.activeHand = null;
                });

                // Bind functions so removeEventListener works correctly
                this.onTriggerDown = () => {
                if (this.hovering) this.rotating = true;
                };

                this.onTriggerUp = () => {
                this.rotating = false;
                };
            },

            tick: function () {
                if (!this.rotating) return;

                this.el.object3D.rotation.y += 0.05 * this.direction;
            }
            });
        </script>
